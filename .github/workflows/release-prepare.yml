name: Prepare release

on:
  workflow_dispatch:
    inputs:
      targetSha:
        description: "Current master SHA to plan from (defaults to master)"
        required: false
        type: string

permissions: {}

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-name: ${{ steps.plan.outputs.artifact-name }}
      base-sha: ${{ steps.plan.outputs.base-sha }}
      release: ${{ steps.plan.outputs.release || 'false' }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Resolve target SHA
        id: target
        env:
          DISPATCH_SHA: ${{ inputs.targetSha }}
        run: |
          TARGET_SHA="$DISPATCH_SHA"
          if [[ -z "$TARGET_SHA" ]]; then
            TARGET_SHA="${{ github.sha }}"
          fi
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "target SHA must be a full commit SHA" >&2
            exit 1
          fi
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.target.outputs.sha }}

      - name: Confirm current master
        id: current
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          git fetch --no-tags origin master
          MASTER_SHA="$(git rev-parse origin/master)"
          if [[ "$TARGET_SHA" != "$MASTER_SHA" ]]; then
            echo "Skipping stale tested SHA $TARGET_SHA; master is $MASTER_SHA"
            echo "value=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          echo "value=true" >> "$GITHUB_OUTPUT"

      - name: Classify current commit
        id: classify
        if: steps.current.outputs.value == 'true'
        run: |
          if [[ "$(git log -1 --format=%s)" =~ ^release\(version\):\ Release\  ]]; then
            echo "release-commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "release-commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify previous release is public
        if: >-
          steps.current.outputs.value == 'true' &&
          steps.classify.outputs.release-commit == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('node:fs');

            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = packageJson.version;
            if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(version)) {
              throw new Error(`Invalid current package version: ${version}`);
            }
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matches = releases.filter((release) => release.tag_name === version);
            if (matches.length !== 1 || matches[0].draft || matches[0].prerelease ||
                !matches[0].published_at) {
              throw new Error(
                `Current version ${version} does not have exactly one published stable GitHub release. ` +
                'Recover that release before planning another version.',
              );
            }

      - name: Setup Node
        if: >-
          steps.current.outputs.value == 'true' &&
          steps.classify.outputs.release-commit == 'false'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install planning dependencies
        if: >-
          steps.current.outputs.value == 'true' &&
          steps.classify.outputs.release-commit == 'false'
        run: npm ci --ignore-scripts

      - name: Compute release plan
        id: plan
        if: >-
          steps.current.outputs.value == 'true' &&
          steps.classify.outputs.release-commit == 'false'
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          PLAN="$RUNNER_TEMP/release-plan.json"
          NOTES="$RUNNER_TEMP/release-notes.md"
          node scripts/release-plan.mjs --cwd . --output "$PLAN" --notes-output "$NOTES"
          test "$(jq -r '.baseSha' "$PLAN")" = "$TARGET_SHA"
          RELEASE="$(jq -r '.release' "$PLAN")"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "base-sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          if [[ "$RELEASE" != "true" ]]; then
            exit 0
          fi

          VERSION="$(jq -r '.nextVersion' "$PLAN")"
          CURRENT_VERSION="$(node -p 'require("./package.json").version')"
          PREVIOUS_VERSION="$(jq -r '.previousVersion' "$PLAN")"
          test "$CURRENT_VERSION" = "$PREVIOUS_VERSION"
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid planned version: $VERSION" >&2
            exit 1
          fi
          OUTPUT="$RUNNER_TEMP/release-version-files"
          node scripts/release-contract.mjs materialize \
            --root . \
            --out "$OUTPUT" \
            --version "$VERSION" \
            --base-sha "$TARGET_SHA"
          ARTIFACT_NAME="release-version-files-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload version-file plan
        if: steps.plan.outputs.release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.plan.outputs.artifact-name }}
          path: ${{ runner.temp }}/release-version-files
          if-no-files-found: error
          retention-days: 1

  open-pr:
    name: Open release PR
    needs: plan
    if: needs.plan.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Download version-file plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.plan.outputs.artifact-name }}
          path: release-version-files

      - name: Create release branch and PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          BASE_SHA: ${{ needs.plan.outputs.base-sha }}
          VERSION: ${{ needs.plan.outputs.version }}
        with:
          script: |
            const crypto = require('node:crypto');
            const fs = require('node:fs');
            const path = require('node:path');

            const baseSha = process.env.BASE_SHA;
            const version = process.env.VERSION;
            const expectedFiles = ['manifest.json', 'package-lock.json', 'package.json', 'versions.json'];
            const root = path.resolve('release-version-files');
            const metadataPath = path.join(root, 'release-version-files.json');
            const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            if (!/^[0-9a-f]{40}$/.test(baseSha) || !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(version)) {
              throw new Error('Invalid release plan identity.');
            }
            if (metadata.schemaVersion !== 1 || metadata.baseSha !== baseSha || metadata.version !== version) {
              throw new Error('Release artifact metadata does not match workflow outputs.');
            }
            if (!Array.isArray(metadata.files) || metadata.files.length !== expectedFiles.length) {
              throw new Error('Release artifact metadata has an invalid file list.');
            }

            const fileEntries = [];
            for (const name of expectedFiles) {
              const entry = metadata.files.find((candidate) => candidate.name === name);
              const filePath = path.join(root, name);
              const stat = fs.lstatSync(filePath);
              if (!entry || !stat.isFile() || stat.isSymbolicLink()) {
                throw new Error(`Invalid release artifact: ${name}`);
              }
              const contents = fs.readFileSync(filePath);
              const digest = crypto.createHash('sha256').update(contents).digest('hex');
              if (entry.sha256 !== digest || entry.size !== contents.byteLength) {
                throw new Error(`Release artifact digest mismatch: ${name}`);
              }
              fileEntries.push({ name, contents });
            }
            const metadataNames = metadata.files.map((entry) => entry.name).sort();
            if (JSON.stringify(metadataNames) !== JSON.stringify(expectedFiles)) {
              throw new Error('Release artifact metadata contains unexpected paths.');
            }

            const { owner, repo } = context.repo;
            const master = await github.rest.git.getRef({ owner, repo, ref: 'heads/master' });
            if (master.data.object.sha !== baseSha) {
              throw new Error(`Master moved from ${baseSha} to ${master.data.object.sha}; rerun release planning.`);
            }
            const baseCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: baseSha });
            const treeItems = [];
            for (const file of fileEntries) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: file.contents.toString('base64'),
                encoding: 'base64',
              });
              treeItems.push({ path: file.name, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseCommit.data.tree.sha,
              tree: treeItems,
            });
            const title = `release(version): Release ${version}`;
            const commitMarker =
              `podnotes-release-commit schema=1 version=${version} base=${baseSha}`;
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: `${title}\n\n${commitMarker}`,
              tree: tree.data.sha,
              parents: [baseSha],
              author: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com',
              },
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com',
              },
            });
            const branch = `release/${version}`;
            const ref = `heads/${branch}`;
            let existingRef;
            try {
              existingRef = await github.rest.git.getRef({ owner, repo, ref });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });
            if (openPulls.length > 1) throw new Error(`Multiple open PRs exist for ${branch}.`);
            let pullToUpdate = openPulls[0];
            if (existingRef) {
              const existingCommit = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: existingRef.data.object.sha,
              });
              const existingFiles = (existingCommit.data.files || []).map((file) => file.filename).sort();
              if (existingCommit.data.parents.length !== 1 ||
                  existingCommit.data.commit.message.trim() !==
                    `${title}\n\npodnotes-release-commit schema=1 version=${version} ` +
                    `base=${existingCommit.data.parents[0].sha}` ||
                  existingCommit.data.commit.author.email !==
                    '41898282+github-actions[bot]@users.noreply.github.com' ||
                  !(existingCommit.data.files || []).every((file) => file.status === 'modified') ||
                  JSON.stringify(existingFiles) !== JSON.stringify(expectedFiles)) {
                throw new Error(`Refusing to overwrite non-generated branch ${branch}.`);
              }
              if (!pullToUpdate) {
                const closedPulls = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'closed',
                  head: `${owner}:${branch}`,
                  per_page: 100,
                });
                const matching = closedPulls.filter(
                  (pull) => pull.head.sha === existingRef.data.object.sha,
                );
                if (matching.length > 1) {
                  throw new Error(`Release branch ${branch} has multiple matching closed PRs.`);
                }
                if (matching[0]) {
                  const closed = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: matching[0].number,
                  });
                  if (closed.data.merged) {
                    throw new Error(`Refusing to reuse merged release branch ${branch}.`);
                  }
                  pullToUpdate = closed.data;
                }
              }
              if (pullToUpdate) {
                if (pullToUpdate.user?.login !== 'github-actions[bot]' ||
                    pullToUpdate.base.ref !== 'master' ||
                    pullToUpdate.head.repo?.full_name !== `${owner}/${repo}` ||
                    pullToUpdate.head.ref !== branch ||
                    pullToUpdate.head.sha !== existingRef.data.object.sha) {
                  throw new Error(`Refusing to overwrite release branch ${branch} without exact PR provenance.`);
                }

                if (pullToUpdate.state === 'closed') {
                  await github.rest.git.deleteRef({ owner, repo, ref });
                  existingRef = undefined;
                  pullToUpdate = undefined;
                } else if (!pullToUpdate.draft) {
                  await github.graphql(
                    `mutation ConvertReleasePrToDraft($id: ID!) {
                        convertPullRequestToDraft(input: { pullRequestId: $id }) {
                          pullRequest { isDraft }
                        }
                      }`,
                    { id: pullToUpdate.node_id },
                  );
                }
              }
              if (existingRef) {
                await github.rest.git.updateRef({
                  owner,
                  repo,
                  ref,
                  sha: commit.data.sha,
                  force: true,
                });
              }
            }
            if (!existingRef) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${ref}`,
                sha: commit.data.sha,
              });
            }

            const body = [
              `Prepare PodNotes ${version} from tested master commit \`${baseSha}\`.`,
              '',
              'This machine-generated PR changes only the four synchronized version files.',
              'Merge it manually after the explicitly dispatched Test check passes.',
              '',
              `<!-- podnotes-release-pr schema=1 version=${version} base=${baseSha} -->`,
            ].join('\n');
            let pull;
            if (pullToUpdate) {
              pull = await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pullToUpdate.number,
                base: 'master',
                title,
                body,
              });
            } else {
              pull = await github.rest.pulls.create({
                owner,
                repo,
                base: 'master',
                head: branch,
                title,
                body,
                draft: true,
              });
            }
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'test.yml',
              ref: branch,
              inputs: { targetSha: commit.data.sha },
            });
            core.notice(`Release PR #${pull.data.number}: ${pull.data.html_url}`);
