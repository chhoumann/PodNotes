name: Trigger release

on:
  pull_request_target:
    types: [closed]

permissions: {}

concurrency:
  group: release-trigger
  cancel-in-progress: false

jobs:
  dispatch:
    name: Register and dispatch release
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read
    steps:
      - name: Validate, tag, and dispatch exact release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        with:
          script: |
            const { isDeepStrictEqual } = require('node:util');

            const expectedFiles = ['manifest.json', 'package-lock.json', 'package.json', 'versions.json'];
            const { owner, repo } = context.repo;
            const repository = `${owner}/${repo}`;
            const pullNumber = context.payload.pull_request?.number;
            if (!Number.isSafeInteger(pullNumber) || pullNumber < 1) {
              throw new Error('Release event has an invalid PR number.');
            }

            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
            if (!pull.merged || pull.state !== 'closed' || !pull.merged_at || !pull.merge_commit_sha) {
              throw new Error(`PR #${pullNumber} is not merged.`);
            }
            if (pull.user?.login !== 'github-actions[bot]') {
              throw new Error(`PR #${pullNumber} was not created by github-actions[bot].`);
            }
            if (pull.merged_by?.login !== owner) {
              throw new Error(`PR #${pullNumber} was not merged by repository owner ${owner}.`);
            }
            if (pull.base.ref !== 'master' || pull.head.repo?.full_name !== repository) {
              throw new Error(`PR #${pullNumber} has invalid base or repository provenance.`);
            }
            const branchMatch = /^release\/((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*))$/.exec(pull.head.ref);
            if (!branchMatch) throw new Error(`PR #${pullNumber} does not use a valid release branch.`);
            const version = branchMatch[1];
            const title = `release(version): Release ${version}`;
            if (pull.title !== title) throw new Error(`PR #${pullNumber} title does not match ${version}.`);

            const markerPattern = new RegExp(
              `<!-- podnotes-release-pr schema=1 version=${version.replaceAll('.', '\\.')}` +
              ' base=([0-9a-f]{40}) -->',
            );
            const marker = markerPattern.exec(pull.body || '');
            if (!marker) throw new Error(`PR #${pullNumber} is missing valid release provenance.`);
            const baseSha = marker[1];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });
            const changedFiles = files.map((file) => file.filename).sort();
            if (JSON.stringify(changedFiles) !== JSON.stringify(expectedFiles)) {
              throw new Error(`PR #${pullNumber} must change exactly the synchronized version files.`);
            }

            const headCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: pull.head.sha });
            if (headCommit.data.parents.length !== 1 || headCommit.data.parents[0].sha !== baseSha) {
              throw new Error(`PR #${pullNumber} head does not descend directly from its recorded base.`);
            }
            if (headCommit.data.message.trim() !==
                `${title}\n\npodnotes-release-commit schema=1 version=${version} base=${baseSha}`) {
              throw new Error(`PR #${pullNumber} head commit message is invalid.`);
            }

            const releaseSha = pull.merge_commit_sha;
            const releaseCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: releaseSha });
            if (releaseCommit.data.parents.length !== 1 || releaseCommit.data.parents[0].sha !== baseSha) {
              throw new Error(`PR #${pullNumber} was not squash-merged directly onto its recorded base.`);
            }
            if (releaseCommit.data.message.split('\n')[0] !== `${title} (#${pullNumber})`) {
              throw new Error(`PR #${pullNumber} merge commit message is invalid.`);
            }
            if (releaseCommit.data.tree.sha !== headCommit.data.tree.sha) {
              throw new Error(`PR #${pullNumber} merge tree does not match its validated head tree.`);
            }
            if (process.env.EVENT_REF !== 'refs/heads/master' || process.env.EVENT_SHA !== releaseSha) {
              throw new Error(
                `Release trigger must run from master at ${releaseSha}; got ` +
                `${process.env.EVENT_REF} at ${process.env.EVENT_SHA}.`,
              );
            }

            function assertRecord(value, label) {
              if (typeof value !== 'object' || value === null || Array.isArray(value)) {
                throw new Error(`${label} must be a JSON object.`);
              }
            }

            function versionParts(value, label) {
              if (typeof value !== 'string' ||
                  !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(value)) {
                throw new Error(`${label} is not a stable semantic version.`);
              }
              return value.split('.').map(Number);
            }

            function compareVersions(left, right) {
              const leftParts = versionParts(left, 'candidate version');
              const rightParts = versionParts(right, 'base version');
              for (let index = 0; index < 3; index += 1) {
                if (leftParts[index] !== rightParts[index]) {
                  return leftParts[index] - rightParts[index];
                }
              }
              return 0;
            }

            function rootLockPackage(lock, label) {
              assertRecord(lock.packages, `${label}.packages`);
              const rootPackage = lock.packages[''];
              assertRecord(rootPackage, `${label}.packages[""]`);
              return rootPackage;
            }

            function synchronizedVersion(packageJson, lock, manifest, label) {
              const values = [
                packageJson.version,
                lock.version,
                rootLockPackage(lock, label).version,
                manifest.version,
              ];
              if (!values.every((value) => value === values[0])) {
                throw new Error(`${label} version fields are not synchronized.`);
              }
              versionParts(values[0], `${label} version`);
              return values[0];
            }

            function equalExceptField(candidate, baseline, field) {
              const normalized = structuredClone(candidate);
              normalized[field] = baseline[field];
              return isDeepStrictEqual(normalized, baseline);
            }

            async function readJsonAt(ref, file) {
              const response = await github.rest.repos.getContent({ owner, repo, path: file, ref });
              const data = response.data;
              if (Array.isArray(data) || data.type !== 'file' || data.encoding !== 'base64' ||
                  typeof data.content !== 'string') {
                throw new Error(`Unable to read regular JSON file ${file} at ${ref}.`);
              }
              const value = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
              assertRecord(value, `${file} at ${ref}`);
              return value;
            }

            const [
              basePackage,
              baseLock,
              baseManifest,
              baseVersions,
              nextPackage,
              nextLock,
              nextManifest,
              nextVersions,
            ] = await Promise.all([
              readJsonAt(baseSha, 'package.json'),
              readJsonAt(baseSha, 'package-lock.json'),
              readJsonAt(baseSha, 'manifest.json'),
              readJsonAt(baseSha, 'versions.json'),
              readJsonAt(releaseSha, 'package.json'),
              readJsonAt(releaseSha, 'package-lock.json'),
              readJsonAt(releaseSha, 'manifest.json'),
              readJsonAt(releaseSha, 'versions.json'),
            ]);
            const baseVersion = synchronizedVersion(
              basePackage,
              baseLock,
              baseManifest,
              'base',
            );
            const nextVersion = synchronizedVersion(
              nextPackage,
              nextLock,
              nextManifest,
              'release',
            );
            if (basePackage.name !== 'podnotes' || baseManifest.id !== 'podnotes' ||
                nextVersion !== version || compareVersions(nextVersion, baseVersion) <= 0) {
              throw new Error('Release identity or version progression is invalid.');
            }
            if (typeof baseManifest.minAppVersion !== 'string' || !baseManifest.minAppVersion ||
                typeof nextManifest.minAppVersion !== 'string' || !nextManifest.minAppVersion) {
              throw new Error('Manifest compatibility versions must be non-empty strings.');
            }
            if (baseVersions[baseVersion] !== baseManifest.minAppVersion ||
                nextVersions[nextVersion] !== nextManifest.minAppVersion) {
              throw new Error('Release version history does not match manifest compatibility.');
            }
            if (!equalExceptField(nextPackage, basePackage, 'version')) {
              throw new Error('package.json changed outside its version field.');
            }
            const normalizedLock = structuredClone(nextLock);
            normalizedLock.version = baseLock.version;
            rootLockPackage(normalizedLock, 'release lock').version =
              rootLockPackage(baseLock, 'base lock').version;
            if (!isDeepStrictEqual(normalizedLock, baseLock)) {
              throw new Error('package-lock.json changed outside its version fields.');
            }
            if (!equalExceptField(nextManifest, baseManifest, 'version')) {
              throw new Error('manifest.json changed outside its version field.');
            }
            if (Object.prototype.hasOwnProperty.call(baseVersions, nextVersion)) {
              throw new Error(`Base versions.json already contains ${nextVersion}.`);
            }
            const normalizedVersions = structuredClone(nextVersions);
            delete normalizedVersions[nextVersion];
            if (!isDeepStrictEqual(normalizedVersions, baseVersions)) {
              throw new Error('versions.json changed outside the new release entry.');
            }

            const master = await github.rest.git.getRef({ owner, repo, ref: 'heads/master' });
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${releaseSha}...${master.data.object.sha}`,
            });
            if (!['ahead', 'identical'].includes(comparison.data.status) ||
                comparison.data.merge_base_commit.sha !== releaseSha) {
              throw new Error(`Release commit ${releaseSha} is not on current master.`);
            }

            async function resolveTagCommit(tag) {
              let reference;
              try {
                reference = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
              let object = reference.data.object;
              for (let depth = 0; object.type === 'tag' && depth < 5; depth += 1) {
                const annotated = await github.rest.git.getTag({ owner, repo, tag_sha: object.sha });
                object = annotated.data.object;
              }
              if (object.type !== 'commit') {
                throw new Error(`Tag ${tag} does not resolve to a commit.`);
              }
              return object.sha;
            }

            const previousTagSha = await resolveTagCommit(baseVersion);
            if (!previousTagSha) {
              throw new Error(`Previous release tag ${baseVersion} does not exist.`);
            }
            const [tagPackage, tagLock, tagManifest, tagVersions] = await Promise.all([
              readJsonAt(previousTagSha, 'package.json'),
              readJsonAt(previousTagSha, 'package-lock.json'),
              readJsonAt(previousTagSha, 'manifest.json'),
              readJsonAt(previousTagSha, 'versions.json'),
            ]);
            if (tagPackage.name !== 'podnotes' || tagManifest.id !== 'podnotes' ||
                synchronizedVersion(tagPackage, tagLock, tagManifest, 'previous tag') !==
                  baseVersion ||
                tagVersions[baseVersion] !== tagManifest.minAppVersion) {
              throw new Error(`Previous release tag ${baseVersion} has invalid version metadata.`);
            }
            const previousComparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${previousTagSha}...${baseSha}`,
            });
            if (!['ahead', 'identical'].includes(previousComparison.data.status) ||
                previousComparison.data.merge_base_commit.sha !== previousTagSha) {
              throw new Error(`Previous release tag ${baseVersion} is not an ancestor of the base.`);
            }

            const existingTagSha = await resolveTagCommit(version);
            if (existingTagSha && existingTagSha !== releaseSha) {
              throw new Error(`Tag ${version} points to ${existingTagSha}, expected ${releaseSha}.`);
            }

            const runBranch = `release-run/${version}`;
            let runRef;
            try {
              runRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${runBranch}` });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (runRef && runRef.data.object.sha !== releaseSha) {
              throw new Error(
                `Recovery branch ${runBranch} points to ${runRef.data.object.sha}, expected ${releaseSha}.`,
              );
            }
            if (!runRef) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${runBranch}`,
                sha: releaseSha,
              });
            }

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'release.yml',
              ref: runBranch,
              inputs: { releasePr: String(pullNumber) },
            });
            core.notice(
              `Dispatched PodNotes ${version} from release PR #${pullNumber} at ${runBranch}.`,
            );
